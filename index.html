<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Earth Cam WebXR V8 - Outward Panels + Arrow Connectors</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #overlay {
      position: fixed;
      left: 12px;
      bottom: 12px;
      max-width: 560px;
      padding: 10px 12px;
      color: #d8f7ff;
      background: rgba(0, 12, 24, 0.72);
      border: 1px solid rgba(80, 220, 255, 0.45);
      border-radius: 10px;
      font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 5;
    }
    #overlay b { color: #ffffff; }
    #overlay code { color: #ffd36e; }
  </style>
</head>
<body>
  <div id="overlay">
    <b>Earth Cam WebXR V8</b><br />
    Cloudflare Worker mode: panels use <code>/cam/*.jpg</code> proxy URLs with CORS headers.<br />
    Browser refreshes panel textures every <code>60s</code>; Worker cache/cron refresh target is <code>5 minutes</code>.<br />
    If no Worker URL is configured, local placeholder images from <code>cams/</code> are used.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: false; sortObjects: true"
    background="color: #000006"
    xr-mode-ui="enabled: true"
    embedded>

    <a-assets timeout="10000">
      <img id="earthOutline" src="assets/earth_continent_outline_4096x2048.png" />
      <img id="camChicago" src="cams/chicago.jpg" />
      <img id="camAlpena" src="cams/alpena.jpg" />
      <img id="camMuskegon" src="cams/muskegon.jpg" />
      <img id="camBardolino" src="cams/bardolino.jpg" />
      <img id="camZechneralm" src="cams/zechneralm.jpg" />
      <img id="camJenner" src="cams/jenner.jpg" />
      <img id="camShimizu" src="cams/shimizu.jpg" />
      <img id="camFujinomiya" src="cams/fujinomiya.jpg" />
      <img id="camGotemba" src="cams/gotemba.jpg" />
    </a-assets>

    <a-entity id="starfield" starfield="count: 1200; radius: 85"></a-entity>

    <a-entity light="type: ambient; color: #8fbaff; intensity: 0.55"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.9" position="-3 5 2"></a-entity>
    <a-entity light="type: point; color: #4fe7ff; intensity: 0.85; distance: 9" position="0 2.5 -2.8"></a-entity>

    <a-entity id="world" earth-cam-world-v8></a-entity>

    <a-entity id="rig" position="0 1.6 0" simple-vr-navigation>
      <a-entity id="camera"
        camera
        look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true"
        wasd-controls="acceleration: 18"
        position="0 0 0">
      </a-entity>
      <a-entity id="leftHand" laser-controls="hand: left" oculus-touch-controls="hand: left"></a-entity>
      <a-entity id="rightHand" laser-controls="hand: right" oculus-touch-controls="hand: right"></a-entity>
    </a-entity>
  </a-scene>

<script>
/*
  Earth Cam WebXR V8
  - Uses a Cloudflare Worker image proxy when WORKER_BASE_DEFAULT or ?worker=... is configured.
  - The Worker fetches remote webcam stills, caches for 5 minutes, and serves with CORS headers.
  - The WebXR page refreshes textures every 60 seconds with cache-busting.
  - Falls back to local /cams/*.jpg placeholders when no Worker URL is configured.
*/

const GLOBE_CENTER = new THREE.Vector3(0, 1.62, -3.35);
const GLOBE_RADIUS = 0.86;
const REFRESH_SECONDS = 60;
const PANEL_REFRESH_STAGGER_SECONDS = 5;
const USER_TARGET = new THREE.Vector3(0, 1.6, 0);

// Paste your deployed Cloudflare Worker URL here, or pass it as a query parameter:
// index.html?worker=https%3A%2F%2Fearth-cam-webxr-proxy.YOUR_SUBDOMAIN.workers.dev
const WORKER_BASE_DEFAULT = "https://earth-cam-webxr-proxy.earthcam-james.workers.dev";

function configuredWorkerBase() {
  const qs = new URLSearchParams(window.location.search);
  const fromQuery = qs.get("worker");
  const base = (fromQuery || WORKER_BASE_DEFAULT || "").trim().replace(/\/+$/, "");
  if (!base || base.includes("REPLACE_WITH_YOUR_WORKER")) return "";
  return base;
}

function camSourceUrl(cam) {
  const base = configuredWorkerBase();
  if (base) return `${base}/cam/${cam.id}.jpg`;
  return cam.localUrl;
}

function camSourceMode() {
  return configuredWorkerBase() ? "CLOUDFLARE WORKER" : "LOCAL PLACEHOLDER";
}

function faceFrontToward(object3D, target) {
  object3D.lookAt(target);
}

function orientPanelOutwardFromEarth(object3D) {
  // Make the readable face of the panel point away from the globe.
  object3D.lookAt(GLOBE_CENTER);
}

function regionColor(region) {
  if (region === "US") return "#4fe7ff";
  if (region === "EUROPE") return "#ffd36e";
  if (region === "JAPAN") return "#ff7bd5";
  return "#ffffff";
}

function setSRGB(texture) {
  if (THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;
  else texture.encoding = THREE.sRGBEncoding;
}

function finishTexture(texture) {
  setSRGB(texture);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;
  texture.anisotropy = 4;
  texture.needsUpdate = true;
  return texture;
}

function enhanceImageTextureFromImage(image) {
  const width = image.naturalWidth || image.videoWidth || image.width || 1280;
  const height = image.naturalHeight || image.videoHeight || image.height || 720;
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d', {willReadFrequently: true});
  ctx.filter = 'brightness(1.18) contrast(1.16) saturate(1.06)';
  ctx.drawImage(image, 0, 0, width, height);

  try {
    const src = ctx.getImageData(0, 0, width, height);
    const dst = ctx.createImageData(width, height);
    const s = src.data;
    const d = dst.data;
    const amt = 0.22;

    d.set(s);
    for (let y = 1; y < height - 1; y++) {
      for (let x = 1; x < width - 1; x++) {
        const i = (y * width + x) * 4;
        const li = i - 4, ri = i + 4, ti = i - width * 4, bi = i + width * 4;
        for (let c = 0; c < 3; c++) {
          const center = s[i + c];
          const sharp = 5 * center - s[li + c] - s[ri + c] - s[ti + c] - s[bi + c];
          d[i + c] = Math.max(0, Math.min(255, center * (1 - amt) + sharp * amt));
        }
        d[i + 3] = s[i + 3];
      }
    }
    ctx.putImageData(dst, 0, 0);
  } catch (e) {
    // If pixel access fails for any reason, keep the brightness/contrast enhanced image.
  }

  return finishTexture(new THREE.CanvasTexture(canvas));
}

function makeMissingImageTexture(label, color = "#4fe7ff") {
  const c = document.createElement("canvas");
  c.width = 1280;
  c.height = 720;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#06111f";
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.strokeStyle = color;
  ctx.lineWidth = 18;
  ctx.strokeRect(24, 24, c.width - 48, c.height - 48);
  ctx.strokeStyle = "rgba(79,231,255,0.28)";
  ctx.lineWidth = 2;
  for (let x = 0; x < c.width; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke(); }
  for (let y = 0; y < c.height; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke(); }
  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "700 68px system-ui, sans-serif";
  ctx.fillText(label, c.width / 2, c.height * 0.44);
  ctx.fillStyle = "#cdefff";
  ctx.font = "500 34px system-ui, sans-serif";
  ctx.fillText("local image slot - check /cams/ path", c.width / 2, c.height * 0.56);
  return finishTexture(new THREE.CanvasTexture(c));
}

function loadPanelTexture(url, fallbackLabel, color, onDone) {
  const loader = new THREE.TextureLoader();
  if (/^https?:\/\//i.test(url)) loader.setCrossOrigin("anonymous");
  loader.load(
    url,
    tex => {
      const enhanced = tex.image ? enhanceImageTextureFromImage(tex.image) : finishTexture(tex);
      if (tex !== enhanced) tex.dispose();
      onDone(enhanced, true);
    },
    undefined,
    () => onDone(makeMissingImageTexture(fallbackLabel, color), false)
  );
}

function latLonToLocal(latDeg, lonDeg, radius = GLOBE_RADIUS) {
  // Matches Three.js SphereGeometry equirectangular UV orientation.
  const theta = THREE.MathUtils.degToRad(lonDeg + 180.0);
  const phi = THREE.MathUtils.degToRad(90.0 - latDeg);
  const x = -radius * Math.cos(theta) * Math.sin(phi);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(theta) * Math.sin(phi);
  return new THREE.Vector3(x, y, z);
}

function latLonToWorld(latDeg, lonDeg, radius = GLOBE_RADIUS) {
  return latLonToLocal(latDeg, lonDeg, radius).add(GLOBE_CENTER);
}

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  return {
    r: parseInt(h.substring(0, 2), 16),
    g: parseInt(h.substring(2, 4), 16),
    b: parseInt(h.substring(4, 6), 16)
  };
}


function arrowColorForIndex(index, region) {
  const palettes = {
    US: ["#37d8ff", "#4fe7ff", "#8cf7ff"],
    EUROPE: ["#ffbf3c", "#ffd36e", "#ffe79f"],
    JAPAN: ["#ff5fc8", "#ff7bd5", "#ffa3e6"]
  };
  const arr = palettes[region] || ["#ffffff"];
  return arr[index % arr.length];
}

function makeTextTexture(lines, options = {}) {
  const width = options.width || 1024;
  const height = options.height || 256;
  const color = options.color || "#d8f7ff";
  const c = document.createElement("canvas");
  c.width = width;
  c.height = height;
  const ctx = c.getContext("2d");
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = options.background || "rgba(0,0,0,0)";
  if (options.background) ctx.fillRect(0, 0, width, height);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.font = `700 ${options.titleSize || 56}px system-ui, sans-serif`;
  ctx.fillText(lines[0] || "", width / 2, height * 0.36);

  ctx.shadowBlur = 8;
  ctx.fillStyle = "rgba(216,247,255,0.92)";
  ctx.font = `500 ${options.subSize || 30}px system-ui, sans-serif`;
  ctx.fillText(lines[1] || "", width / 2, height * 0.68);

  const tex = new THREE.CanvasTexture(c);
  setSRGB(tex);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  return tex;
}

AFRAME.registerComponent("starfield", {
  schema: {
    count: {type: "int", default: 900},
    radius: {type: "number", default: 80}
  },
  init: function () {
    const positions = [];
    const colors = [];
    for (let i = 0; i < this.data.count; i++) {
      const r = this.data.radius * (0.54 + Math.random() * 0.46);
      const theta = Math.random() * Math.PI * 2;
      const u = Math.random() * 2 - 1;
      const phi = Math.acos(u);
      positions.push(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
      const v = 0.55 + Math.random() * 0.45;
      colors.push(v, v, v);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
      size: 0.055,
      vertexColors: true,
      transparent: true,
      opacity: 0.88,
      depthWrite: false
    });
    const points = new THREE.Points(geo, mat);
    this.el.object3D.add(points);
  }
});

AFRAME.registerComponent("simple-vr-navigation", {
  init: function () {
    this.move = new THREE.Vector2(0, 0);
    this.turn = 0;
    const left = document.querySelector("#leftHand");
    const right = document.querySelector("#rightHand");

    if (left) {
      left.addEventListener("thumbstickmoved", e => {
        this.move.x = e.detail.x || 0;
        this.move.y = e.detail.y || 0;
      });
      left.addEventListener("thumbsticktouchend", () => this.move.set(0, 0));
    }
    if (right) {
      right.addEventListener("thumbstickmoved", e => {
        this.turn = e.detail.x || 0;
      });
      right.addEventListener("thumbsticktouchend", () => this.turn = 0);
    }
  },
  tick: function (time, dt) {
    const rig = this.el.object3D;
    const cameraEl = document.querySelector("#camera");
    if (!cameraEl) return;
    const camera = cameraEl.object3D;
    const seconds = Math.min(dt / 1000, 0.05);

    if (Math.abs(this.move.x) > 0.08 || Math.abs(this.move.y) > 0.08) {
      const speed = 1.6;
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.y = 0;
      dir.normalize();
      const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
      rig.position.addScaledVector(dir, -this.move.y * speed * seconds);
      rig.position.addScaledVector(right, this.move.x * speed * seconds);
    }

    if (Math.abs(this.turn) > 0.08) {
      rig.rotation.y -= this.turn * seconds * 1.25;
    }
  }
});

AFRAME.registerComponent("earth-cam-world-v8", {
  init: function () {
    this.group = new THREE.Group();
    this.el.object3D.add(this.group);
    this.panelImageMeshes = [];
    this.panelStatusLabels = [];

    this.createGlobe();
    this.createRegionHeaders();
    this.createPanelsMarkersConnectors();
    this.startPanelRefresh();
  },

  createGlobe: function () {
    // Dark, semi-transparent ocean core.
    const oceanGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 128, 64);
    const oceanMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color("#03111e"),
      emissive: new THREE.Color("#031728"),
      emissiveIntensity: 0.75,
      roughness: 0.8,
      metalness: 0.05,
      transparent: true,
      opacity: 0.63,
      depthWrite: false
    });
    const ocean = new THREE.Mesh(oceanGeo, oceanMat);
    ocean.position.copy(GLOBE_CENTER);
    this.group.add(ocean);

    // Accurate outline texture on a slightly larger holographic sphere.
    const texture = new THREE.TextureLoader().load("assets/earth_continent_outline_4096x2048.png", tex => {
      setSRGB(tex);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = false;
    });
    const outlineMat = new THREE.MeshBasicMaterial({
      map: texture,
      transparent: true,
      opacity: 0.96,
      alphaTest: 0.015,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const outline = new THREE.Mesh(new THREE.SphereGeometry(GLOBE_RADIUS * 1.006, 160, 80), outlineMat);
    outline.position.copy(GLOBE_CENTER);
    this.group.add(outline);

    // Atmosphere glow.
    const atmosMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color("#3adfff"),
      transparent: true,
      opacity: 0.075,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const atmos = new THREE.Mesh(new THREE.SphereGeometry(GLOBE_RADIUS * 1.07, 128, 64), atmosMat);
    atmos.position.copy(GLOBE_CENTER);
    this.group.add(atmos);

    // Equator + polar rings.
    this.addRing(GLOBE_CENTER, GLOBE_RADIUS * 1.02, "#4fe7ff", new THREE.Euler(Math.PI / 2, 0, 0), 0.34);
    this.addRing(GLOBE_CENTER, GLOBE_RADIUS * 1.025, "#4fe7ff", new THREE.Euler(0, 0, Math.PI / 2), 0.18);
    this.addRing(GLOBE_CENTER, GLOBE_RADIUS * 1.025, "#4fe7ff", new THREE.Euler(0, Math.PI / 2, 0), 0.18);

    const titleTex = makeTextTexture([
      "EARTH LIVE-STILL MONITOR",
      "Outward-facing panels / curved arrow connectors / 5-minute cache target"
    ], {width: 1600, height: 220, color: "#d8f7ff", titleSize: 66, subSize: 32});
    const title = new THREE.Mesh(
      new THREE.PlaneGeometry(3.9, 0.54),
      new THREE.MeshBasicMaterial({map: titleTex, transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false})
    );
    title.position.set(0, 3.78, -3.56);
    faceFrontToward(title, USER_TARGET);
    title.renderOrder = 60;
    this.group.add(title);
  },

  addRing: function (center, radius, color, rotation, opacity) {
    const ringGeo = new THREE.TorusGeometry(radius, 0.004, 8, 192);
    const ringMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color),
      transparent: true,
      opacity: opacity,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(center);
    ring.rotation.copy(rotation);
    this.group.add(ring);
  },

  createRegionHeaders: function () {
    const headers = [
      {label: "US", color: "#4fe7ff", pos: [-3.95, 3.22, -3.20]},
      {label: "EUROPE", color: "#ffd36e", pos: [0.0, 3.90, -4.18]},
      {label: "JAPAN", color: "#ff7bd5", pos: [3.95, 3.22, -3.20]}
    ];
    headers.forEach(h => {
      const tex = makeTextTexture([h.label, "worker-proxied snapshot group"], {
        width: 900,
        height: 220,
        color: h.color,
        titleSize: 72,
        subSize: 28
      });
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(1.45, 0.36),
        new THREE.MeshBasicMaterial({map: tex, transparent: true, side: THREE.FrontSide, depthTest: false, depthWrite: false})
      );
      mesh.position.set(h.pos[0], h.pos[1], h.pos[2]);
      faceFrontToward(mesh, USER_TARGET);
      mesh.renderOrder = 60;
      this.group.add(mesh);
    });
  },

  createPanelsMarkersConnectors: function () {
    CAMS.forEach((cam, index) => {
      const color = regionColor(cam.region);
      const cityPos = latLonToWorld(cam.lat, cam.lon, GLOBE_RADIUS * 1.052);
      const panelPos = new THREE.Vector3(cam.panel[0], cam.panel[1], cam.panel[2]);

      this.createCityMarker(cam, cityPos, color);
      this.createConnector(cityPos, panelPos, color, index, cam);
      this.createPanel(cam, panelPos, color, index);
    });
  },

  createCityMarker: function (cam, pos, color) {
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color),
      transparent: true,
      opacity: 1.0,
      depthWrite: false,
      depthTest: false
    });
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.028, 18, 10), mat);
    dot.position.copy(pos);
    this.group.add(dot);

    const haloMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color),
      transparent: true,
      opacity: 0.22,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      depthTest: false
    });
    const halo = new THREE.Mesh(new THREE.SphereGeometry(0.062, 24, 12), haloMat);
    halo.position.copy(pos);
    this.group.add(halo);
  },

  createConnector: function (start, panelPos, color, index, cam) {
    const arrowColor = arrowColorForIndex(index, cam.region);
    const panelDir = panelPos.clone().sub(GLOBE_CENTER).normalize();
    const end = panelPos.clone().add(panelDir.clone().multiplyScalar(-0.72));

    // Curved arrow with a colorful shaft and cone tip.
    const direction = start.clone().sub(GLOBE_CENTER).normalize();
    const midpoint = start.clone().lerp(end, 0.5);
    const lift = 0.22 + 0.08 * (index % 3);
    const side = new THREE.Vector3(panelDir.z, 0, -panelDir.x).normalize().multiplyScalar(((index % 2) ? 0.18 : -0.18));
    const control = midpoint.add(direction.multiplyScalar(0.30)).add(side).add(new THREE.Vector3(0, lift, 0));
    const curve = new THREE.QuadraticBezierCurve3(start, control, end);

    const tubeGeo = new THREE.TubeGeometry(curve, 44, 0.009, 10, false);
    const tubeMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(arrowColor),
      transparent: true,
      opacity: 0.88,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    this.group.add(tube);

    const glowGeo = new THREE.TubeGeometry(curve, 28, 0.018, 8, false);
    const glowMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(arrowColor),
      transparent: true,
      opacity: 0.16,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    this.group.add(glow);

    const tipPos = curve.getPoint(0.992);
    const tangent = curve.getTangent(0.992).normalize();
    const coneGeo = new THREE.ConeGeometry(0.040, 0.13, 18);
    const coneMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(arrowColor),
      transparent: true,
      opacity: 0.96,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.copy(tipPos);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tangent);
    this.group.add(cone);
  },

  createPanel: function (cam, pos, color, index) {
    const rgb = hexToRgb(color);
    const panelGroup = new THREE.Group();
    panelGroup.position.copy(pos);
    orientPanelOutwardFromEarth(panelGroup);

    // Outer translucent frame.
    const backMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color("#061a29"),
      transparent: true,
      opacity: 0.72,
      side: THREE.DoubleSide,
      depthTest: false,
      depthWrite: false
    });
    const back = new THREE.Mesh(new THREE.PlaneGeometry(1.14, 0.82), backMat);
    back.position.z = -0.020;
    back.renderOrder = 10;
    panelGroup.add(back);

    const frameMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color),
      transparent: true,
      opacity: 0.45,
      blending: THREE.AdditiveBlending,
      side: THREE.FrontSide,
      depthTest: false,
      depthWrite: false
    });
    const frameTop = new THREE.Mesh(new THREE.BoxGeometry(1.16, 0.018, 0.012), frameMat);
    frameTop.position.set(0, 0.415, 0.032);
    frameTop.renderOrder = 40;
    panelGroup.add(frameTop);
    const frameBottom = frameTop.clone();
    frameBottom.position.set(0, -0.415, 0.032);
    frameBottom.renderOrder = 40;
    panelGroup.add(frameBottom);
    const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.83, 0.012), frameMat);
    frameLeft.position.set(-0.58, 0, 0.032);
    frameLeft.renderOrder = 40;
    panelGroup.add(frameLeft);
    const frameRight = frameLeft.clone();
    frameRight.position.set(0.58, 0, 0.032);
    frameRight.renderOrder = 40;
    panelGroup.add(frameRight);

    // Image plane: same-origin local file path. Use a generated fallback texture so the panel never goes invisible.
    const imageMat = new THREE.MeshBasicMaterial({
      map: makeMissingImageTexture(cam.name, color),
      color: new THREE.Color("#ffffff"),
      side: THREE.DoubleSide,
      transparent: false,
      depthTest: false,
      depthWrite: false
    });
    const imagePlane = new THREE.Mesh(new THREE.PlaneGeometry(1.04, 0.585), imageMat);
    imagePlane.position.set(0, 0.045, 0.026);
    imagePlane.renderOrder = 30;
    panelGroup.add(imagePlane);

    loadPanelTexture(camSourceUrl(cam), cam.name, color, (tex) => {
      if (imagePlane.material.map) imagePlane.material.map.dispose();
      imagePlane.material.map = tex;
      imagePlane.material.needsUpdate = true;
    });

    // Top title strip.
    const titleTex = makeTextTexture([cam.name, `${cam.region}  |  LAT ${cam.lat.toFixed(2)}  LON ${cam.lon.toFixed(2)}`], {
      width: 1200,
      height: 220,
      color,
      titleSize: 58,
      subSize: 25
    });
    const titleMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.04, 0.18),
      new THREE.MeshBasicMaterial({map: titleTex, transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false})
    );
    titleMesh.position.set(0, 0.345, 0.040);
    titleMesh.renderOrder = 50;
    panelGroup.add(titleMesh);

    // Status strip, updated on each refresh.
    const statusTex = makeTextTexture([camSourceMode(), configuredWorkerBase() ? "proxied webcam still" : "configure Worker URL"], {
      width: 1200,
      height: 180,
      color,
      titleSize: 42,
      subSize: 25
    });
    const statusMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.04, 0.14),
      new THREE.MeshBasicMaterial({map: statusTex, transparent: true, side: THREE.DoubleSide, depthTest: false, depthWrite: false})
    );
    statusMesh.position.set(0, -0.345, 0.040);
    statusMesh.renderOrder = 50;
    panelGroup.add(statusMesh);

    this.panelImageMeshes[index] = {mesh: imagePlane, cam};
    this.panelStatusLabels[index] = statusMesh;
    this.group.add(panelGroup);
  },

  startPanelRefresh: function () {
    CAMS.forEach((cam, index) => {
      setTimeout(() => {
        this.refreshPanel(index);
        setInterval(() => this.refreshPanel(index), REFRESH_SECONDS * 1000);
      }, index * PANEL_REFRESH_STAGGER_SECONDS * 1000);
    });
  },

  refreshPanel: function (index) {
    const item = this.panelImageMeshes[index];
    if (!item) return;
    const cam = item.cam;
    const mesh = item.mesh;
    const color = regionColor(cam.region);
    const source = camSourceUrl(cam);
    const cacheBusted = source + (source.includes("?") ? "&" : "?") + "t=" + Date.now();

    loadPanelTexture(cacheBusted, cam.name, color, (tex, loaded) => {
      if (mesh.material.map) mesh.material.map.dispose();
      mesh.material.map = tex;
      mesh.material.needsUpdate = true;

      const status = this.panelStatusLabels[index];
      if (status) {
        if (status.material.map) status.material.map.dispose();
        status.material.map = makeTextTexture([
          loaded ? (configuredWorkerBase() ? "WORKER IMAGE REFRESHED" : "LOCAL IMAGE REFRESHED") : "FALLBACK DRAWN",
          loaded ? (new Date().toLocaleTimeString() + "  |  " + camSourceMode()) : camSourceUrl(cam)
        ], {width: 1200, height: 180, color, titleSize: 42, subSize: 25});
        status.material.needsUpdate = true;
      }
    });
  }
});
</script>
</body>
</html>
